name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: app
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Rust toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: ${{ runner.os }}-${{ matrix.target }}-rustup-${{ hashFiles('**/rust-toolchain*') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-rustup-

      - name: Cache Tauri tooling
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/tauri
            ~/.local/share/tauri
          key: ${{ runner.os }}-${{ matrix.target }}-tauri-${{ hashFiles('**/package.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-tauri-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libfuse2 \
            rpm

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Sync version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Syncing version to $VERSION"
          VERSION="$VERSION" python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          import os
          version = os.environ["VERSION"]

          tauri_path = Path("src-tauri/tauri.conf.json")
          tauri = json.loads(tauri_path.read_text())
          tauri["version"] = version
          tauri_path.write_text(json.dumps(tauri, indent=2) + "\n")

          pkg_path = Path("package.json")
          pkg = json.loads(pkg_path.read_text())
          pkg["version"] = version
          pkg_path.write_text(json.dumps(pkg, indent=2) + "\n")

          cargo_path = Path("src-tauri/Cargo.toml")
          cargo_text = cargo_path.read_text()
          cargo_text = re.sub(r'^version\s*=\s*"[^"]+"', f'version = "{version}"', cargo_text, count=1, flags=re.M)
          cargo_path.write_text(cargo_text)
          PY

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync SvelteKit
        run: pnpm exec svelte-kit sync

      - name: Build Tauri app
        run: pnpm run tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Upload Linux bundles
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: skycrypt-linux-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload macOS bundles
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: skycrypt-macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/
          if-no-files-found: warn

      - name: Upload Windows bundles
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: skycrypt-windows-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur-publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" AUR/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" AUR/PKGBUILD

          TARBALL="https://github.com/GrishMahat/SkyCrypt-desktop/archive/v${VERSION}.tar.gz"
          SHA256=$(curl -fSL "${TARBALL}" | sha256sum | awk '{print $1}')
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" AUR/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v "$PWD":/repo archlinux:base-devel bash -lc "\
            pacman -Sy --noconfirm --needed git base-devel && \
            useradd -m build && \
            chown -R build:build /repo/AUR && \
            su - build -c 'cd /repo/AUR && makepkg --printsrcinfo > .SRCINFO' \
          "

      - name: Publish to AUR (skycrypt)
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: skycrypt
          pkgbuild: AUR/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ steps.get_version.outputs.VERSION }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

  aur-publish-bin:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD-bin
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" AUR-bin/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" AUR-bin/PKGBUILD

          DEB_NAME=$(VERSION="$VERSION" python3 - <<'PY'
          import json
          import os
          import urllib.request

          version = os.environ["VERSION"]
          url = f"https://api.github.com/repos/GrishMahat/SkyCrypt-desktop/releases/tags/v{version}"
          with urllib.request.urlopen(url) as resp:
              data = json.load(resp)
          deb_assets = [a["name"] for a in data.get("assets", []) if a["name"].endswith(".deb")]
          if not deb_assets:
              raise SystemExit("No .deb asset found on the release.")
          print(deb_assets[0])
          PY
          )

          sed -i "s/^_debname=.*/_debname=\\\"${DEB_NAME}\\\"/" AUR-bin/PKGBUILD

          DEB_SHA=$(curl -fSL "https://github.com/GrishMahat/SkyCrypt-desktop/releases/download/v${VERSION}/${DEB_NAME}" | sha256sum | awk '{print $1}')
          sed -i "s/^sha256sums=.*/sha256sums=('${DEB_SHA}')/" AUR-bin/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -v "$PWD":/repo archlinux:base-devel bash -lc "\
            pacman -Sy --noconfirm --needed git base-devel && \
            useradd -m build && \
            chown -R build:build /repo/AUR-bin && \
            su - build -c 'cd /repo/AUR-bin && makepkg --printsrcinfo > .SRCINFO' \
          "

      - name: Publish to AUR (skycrypt-bin)
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: skycrypt-bin
          pkgbuild: AUR-bin/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ steps.get_version.outputs.VERSION }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
